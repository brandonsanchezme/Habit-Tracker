<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ebebea;
      --text: #1a1a1a; --text2: #666660; --text3: #999993;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
      --green: #1D9E75; --green-light: #E1F5EE; --green-mid: #9FE1CB;
      --green-dark: #0F6E56; --green-darker: #085041;
      --blue: #378ADD; --blue-light: #E6F1FB; --blue-dark: #185FA5; --blue-mid: #B5D4F4;
      --amber: #BA7517; --amber-light: #FAEEDA; --amber-dark: #633806;
      --red: #E24B4A; --red-light: #FCEBEB; --red-mid: #F7C1C1;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1d; --bg2: #2a2a28; --bg3: #333331;
        --text: #f0f0ee; --text2: #aaaaaa; --text3: #777777;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
        --green-light: #0a3326; --green-mid: #0d4a35;
        --green-dark: #5DCAA5; --green-darker: #9FE1CB;
        --blue-light: #0c2a45; --blue-dark: #85B7EB; --blue-mid: #0c447c;
        --amber-light: #2a1a00; --amber-dark: #FAC775;
        --red-light: #3a1010; --red-mid: #7a2020;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; color: var(--text); }
    .tabs-wrap { overflow-x: auto; margin-bottom: 1.5rem; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: var(--radius); padding: 4px; width: 100%; }
    .tab { flex: 1; }
    .tab { padding: 8px 4px; text-align: center; font-size: 12px; border-radius: 6px; border: none; background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .tab.active { background: var(--bg); color: var(--text); font-weight: 500; border: 0.5px solid var(--border); }
    .add-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .add-row input { flex: 1; min-width: 140px; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 14px; outline: none; font-family: inherit; }
    .add-row input:focus { border-color: var(--green); }
    .freq-select { padding: 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; outline: none; font-family: inherit; cursor: pointer; }
    .add-btn { padding: 10px 16px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 13px; cursor: pointer; white-space: nowrap; font-family: inherit; }
    .add-btn:hover { background: var(--bg3); }
    .summary { display: flex; gap: 10px; margin-bottom: 1.25rem; }
    .stat { flex: 1; background: var(--bg2); border-radius: var(--radius); padding: 12px; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .date-label { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; user-select: none; background: var(--bg2); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); }
    .section-header-left { display: flex; align-items: center; gap: 8px; }
    .section-header-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
    .section-header-count { font-size: 11px; color: var(--text3); }
    .section-chevron { font-size: 18px; color: var(--text2); transition: transform 0.2s; display: inline-block; }
    .section-chevron.collapsed { transform: rotate(-90deg); }
    .section-body { overflow: hidden; transition: max-height 0.25s ease; border: 0.5px solid var(--border2); border-top: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg); padding: 0 8px; }
    .section-body.collapsed { max-height: 0 !important; border: none; padding: 0; }
    .section-wrap { margin-top: 12px; margin-bottom: 4px; }
    .habit-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 10px 12px; display: flex; align-items: center; gap: 8px; margin-bottom: 6px; transition: border-color 0.15s, opacity 0.15s; user-select: none; }
    .habit-card.done { border-color: var(--green); background: var(--green-light); }
    .habit-card.freq-weekly { border-left: 3px solid var(--blue); }
    .habit-card.freq-weekly.done { border-left: 3px solid var(--green); }
    .habit-card.freq-monthly { border-left: 3px solid var(--amber); }
    .habit-card.freq-monthly.done { border-left: 3px solid var(--green); }
    .habit-card.dragging { opacity: 0.4; }
    .habit-card.drag-over { border: 1.5px dashed var(--green); }
    .drag-handle { cursor: grab; color: var(--text3); flex-shrink: 0; padding: 4px; touch-action: none; }
    .drag-handle:active { cursor: grabbing; }
    .drag-dots { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
    .drag-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text3); }
    .check-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .habit-card.done .check-btn { background: var(--green); border-color: var(--green); }
    .check-icon { display: none; }
    .habit-card.done .check-icon { display: block; }
    .habit-name { flex: 1; font-size: 13px; color: var(--text); min-width: 0; }
    .habit-card.done .habit-name { color: var(--green-dark); text-decoration: line-through; }
    .streak-badge { font-size: 10px; color: var(--text2); background: var(--bg2); border-radius: 20px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0; }
    .habit-card.done .streak-badge { background: var(--green-mid); color: var(--green-darker); }
    .freq-badge-weekly { font-size: 10px; color: var(--blue-dark); background: var(--blue-light); border-radius: 20px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0; }
    .freq-badge-monthly { font-size: 10px; color: var(--amber); background: var(--amber-light); border-radius: 20px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0; }
    .action-btns { display: flex; gap: 5px; flex-shrink: 0; }
    .note-btn { background: var(--bg2); border: 0.5px solid var(--border2); cursor: pointer; color: var(--text2); font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 6px; font-family: inherit; white-space: nowrap; transition: background 0.15s, color 0.15s; }
    .note-btn.has-note { background: var(--blue-light); color: var(--blue-dark); border-color: var(--blue-mid); }
    .edit-btn { background: var(--bg2); border: 0.5px solid var(--border2); cursor: pointer; color: var(--text2); font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 6px; font-family: inherit; white-space: nowrap; }
    .edit-btn:hover { background: var(--bg3); }
    .del-btn { background: var(--red-light); border: 0.5px solid rgba(226,75,74,0.3); cursor: pointer; color: var(--red); font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 6px; font-family: inherit; white-space: nowrap; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 1.5rem; width: 90%; max-width: 360px; border: 0.5px solid var(--border2); }
    .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; color: var(--text); }
    .modal input[type=text] { width: 100%; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; outline: none; font-family: inherit; margin-bottom: 12px; }
    .modal input[type=text]:focus { border-color: var(--green); }
    .modal select { width: 100%; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; outline: none; font-family: inherit; margin-bottom: 14px; cursor: pointer; }
    .modal textarea { width: 100%; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; outline: none; font-family: inherit; margin-bottom: 12px; resize: vertical; min-height: 100px; line-height: 1.5; }
    .modal textarea:focus { border-color: var(--blue); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btns button { padding: 8px 18px; border-radius: var(--radius); border: 0.5px solid var(--border2); font-size: 13px; cursor: pointer; font-family: inherit; }
    .btn-cancel { background: var(--bg2); color: var(--text2); }
    .btn-save { background: var(--green); color: white; border-color: var(--green); font-weight: 500; }
    .btn-save-blue { background: var(--blue); color: white; border-color: var(--blue); font-weight: 500; }
    .btn-remove-note { background: var(--red-light); color: var(--red); border-color: rgba(226,75,74,0.3); font-weight: 500; margin-right: auto; }
    .empty { text-align: center; padding: 2rem; color: var(--text2); font-size: 13px; }
    .habit-row { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 8px; }
    .habit-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .habit-row-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .habit-row-pct { font-size: 12px; color: var(--text2); }
    .bar-bg { height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .bar-fill { height: 100%; background: var(--green); border-radius: 3px; }
    .dots { display: flex; gap: 3px; flex-wrap: wrap; }
    .dot { width: 18px; height: 18px; border-radius: 3px; background: var(--bg2); border: 0.5px solid var(--border); position: relative; display: flex; align-items: center; justify-content: center; }
    .dot.filled { background: var(--green); border-color: var(--green); }
    .dot.missed { background: var(--red-light); border-color: var(--red-mid); }
    .dot.missed::before, .dot.missed::after { content: ''; position: absolute; width: 9px; height: 1.5px; background: var(--red); border-radius: 1px; }
    .dot.missed::before { transform: rotate(45deg); }
    .dot.missed::after { transform: rotate(-45deg); }
    .filter-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: inherit; }
    .filter-btn.active { background: var(--bg2); color: var(--text); font-weight: 500; }
    .group-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 8px; }
    .group-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .group-card-label { font-size: 14px; font-weight: 600; color: var(--text); }
    .group-score { font-size: 12px; color: var(--text2); background: var(--bg2); border-radius: 20px; padding: 3px 10px; }
    .group-items { display: flex; flex-direction: column; gap: 5px; }
    .group-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
    .group-item.done-item { color: var(--green-dark); font-weight: 500; }
    .g-dot { width: 10px; height: 10px; border-radius: 2px; background: var(--bg2); flex-shrink: 0; border: 0.5px solid var(--border2); }
    .g-dot.done-dot { background: var(--green); border-color: var(--green); }
    .log-section-title { font-size: 14px; font-weight: 600; color: var(--text); margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border2); }
    .log-section-title:first-child { margin-top: 0; }
    .log-day { margin-bottom: 14px; }
    .log-day-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .log-day-date { font-size: 13px; font-weight: 600; color: var(--text); }
    .log-day-count { font-size: 11px; color: var(--text2); background: var(--bg2); border-radius: 20px; padding: 2px 8px; }
    .log-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .log-chip { background: var(--green-light); color: var(--green-dark); border: 0.5px solid var(--green-mid); border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 500; }
    .journal-today { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 1.5rem; }
    .journal-today-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .journal-today-date { font-size: 14px; font-weight: 600; color: var(--text); }
    .journal-saved-badge { font-size: 11px; color: var(--green-dark); background: var(--green-light); border-radius: 20px; padding: 2px 10px; display: none; }
    .journal-today textarea { width: 100%; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; outline: none; font-family: inherit; resize: vertical; min-height: 140px; line-height: 1.6; }
    .journal-today textarea:focus { border-color: var(--blue); }
    .journal-today textarea::placeholder { color: var(--text3); }
    .journal-save-btn { margin-top: 10px; padding: 8px 20px; border-radius: var(--radius); border: none; background: var(--blue); color: white; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .journal-past-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
    .journal-entry { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 10px; }
    .journal-entry-date { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
    .journal-entry-text { font-size: 14px; color: var(--text); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .section { display: none; }
    .section.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Habit Tracker</h1>
    <div class="tabs-wrap">
      <div class="tabs">
        <button class="tab active" onclick="showTab('today')">Today</button>
        <button class="tab" onclick="showTab('byday')">By day</button>
        <button class="tab" onclick="showTab('longer')">Longer goals</button>
        <button class="tab" onclick="showTab('journal')">Journal</button>
      </div>
    </div>

    <div id="tab-today" class="section active">
      <div class="add-row">
        <input type="text" id="habitInput" placeholder="Add a new habit..." />
        <select id="freqSelect" class="freq-select">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
        <button class="add-btn" onclick="addHabit()">+ Add</button>
      </div>
      <div class="summary">
        <div class="stat"><div class="stat-num" id="doneCount">0</div><div class="stat-label">Done today</div></div>
        <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total habits</div></div>
        <div class="stat"><div class="stat-num" id="pctCount">0%</div><div class="stat-label">Today's score</div></div>
      </div>
      <div class="date-label" id="dateLabel"></div>
      <div id="habitList"></div>
    </div>

    <div id="tab-byhabit" class="section">
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('7',this)">Last 7 days</button>
        <button class="filter-btn" onclick="setFilter('30',this)">Last 30 days</button>
        <button class="filter-btn" onclick="setFilter('all',this)">All time</button>
      </div>
      <div id="habitConsistency"></div>
    </div>

    <div id="tab-byday" class="section">
      <div class="filter-row">
        <button class="filter-btn active" onclick="setDayView('today',this)">Today</button>
        <button class="filter-btn" onclick="setDayView('habit7',this)">Habits — 7 days</button>
        <button class="filter-btn" onclick="setDayView('habit30',this)">Habits — 30 days</button>
        <button class="filter-btn" onclick="setDayView('habitall',this)">Habits — all time</button>
      </div>
      <div id="dayContent"></div>
    </div>

    <div id="tab-longer" class="section">
      <div class="filter-row">
        <button class="filter-btn active" onclick="setLongerView('week',this)">This week</button>
        <button class="filter-btn" onclick="setLongerView('month',this)">This month</button>
      </div>
      <div id="longerContent"></div>
    </div>

    <div id="tab-journal" class="section">
      <div class="journal-today">
        <div class="journal-today-header">
          <span class="journal-today-date" id="journalTodayDate"></span>
          <span class="journal-saved-badge" id="journalSavedBadge">Saved</span>
        </div>
        <textarea id="journalTextarea" placeholder="Write your thoughts for today..."></textarea>
        <button class="journal-save-btn" onclick="saveJournal()">Save entry</button>
      </div>
      <div id="journalPastSection"></div>
    </div>
  </div>

  <div id="editModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>Edit habit</h3>
      <input type="text" id="editName" placeholder="Habit name" />
      <select id="editFreq">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
        <button class="btn-save" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <div id="noteModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3 id="noteModalTitle">Note</h3>
      <textarea id="noteText" placeholder="Add a note for this habit..."></textarea>
      <div class="modal-btns">
        <button class="btn-remove-note" id="removeNoteBtn" onclick="removeNote()" style="display:none;">Remove note</button>
        <button class="btn-cancel" onclick="closeNoteModal()">Cancel</button>
        <button class="btn-save-blue" onclick="saveNote()">Done</button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_HABITS = [
      { id: 1, name: 'Morning journal', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 2, name: '10,000 steps', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 3, name: 'Mobility (15 min)', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 4, name: '2300 calories', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 5, name: '200g protein', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 6, name: '½ gal water', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 7, name: 'Vitamin + electrolyte', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 8, name: 'Creatine', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 9, name: 'Deadhangs', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 10, name: 'Lift or cardio', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 11, name: 'Read (30 min)', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 12, name: 'R&D (1 hr)', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 13, name: 'Business (1.5 hrs)', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 14, name: 'IG + TT post', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 15, name: '3 major to-dos', freq: 'daily', streak: 0, lastDone: null, note: '' },
      { id: 16, name: 'Weekly meeting', freq: 'weekly', streak: 0, lastDone: null, note: '' },
      { id: 17, name: 'Substack', freq: 'weekly', streak: 0, lastDone: null, note: '' },
      { id: 18, name: 'YouTube', freq: 'weekly', streak: 0, lastDone: null, note: '' },
      { id: 19, name: 'Photo/video journal', freq: 'weekly', streak: 0, lastDone: null, note: '' },
      { id: 20, name: 'Social outing', freq: 'weekly', streak: 0, lastDone: null, note: '' },
    ];

    const todayKey = new Date().toISOString().split('T')[0];
    let habits = JSON.parse(localStorage.getItem('ht_habits') || 'null') || DEFAULT_HABITS.map(h => ({...h}));
    habits = habits.map(h => {
      if (!h.freq) h.freq = h.weekly ? 'weekly' : 'daily';
      if (h.note === undefined) h.note = '';
      return h;
    });

    let history = JSON.parse(localStorage.getItem('ht_history') || '{}');
    let journalEntries = JSON.parse(localStorage.getItem('ht_journal') || '{}');

    // Daily reset — mark missed days for any days the app wasn't opened
    const lastOpenedDate = localStorage.getItem('ht_last_opened');
    if (lastOpenedDate !== todayKey) {
      // If we have a last opened date, fill in all missed days between then and today
      if (lastOpenedDate) {
        const start = new Date(lastOpenedDate + 'T12:00:00');
        const end = new Date(todayKey + 'T12:00:00');
        start.setDate(start.getDate() + 1); // start from day after last opened
        while (start < end) {
          const missedKey = start.toISOString().split('T')[0];
          // Mark as opened but nothing checked — creates empty record = red X for all habits
          if (!history[missedKey]) history[missedKey] = {};
          start.setDate(start.getDate() + 1);
        }
      }
      // Reset today
      history[todayKey] = {};
      localStorage.setItem('ht_last_opened', todayKey);
      localStorage.setItem('ht_history', JSON.stringify(history));
    }

    let collapsed = JSON.parse(localStorage.getItem('ht_collapsed') || '{}');
    let filterDays = '7', dayView = 'today', longerView = 'week';
    let editingId = null, noteEditingId = null;
    let dragSrcId = null, touchDragId = null, touchClone = null, touchTarget = null;

    const tabIds = ['today','byday','longer','journal'];

    document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    document.getElementById('journalTodayDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    function save() {
      localStorage.setItem('ht_habits', JSON.stringify(habits));
      localStorage.setItem('ht_history', JSON.stringify(history));
    }
    function saveJournalData() { localStorage.setItem('ht_journal', JSON.stringify(journalEntries)); }
    function saveCollapsed() { localStorage.setItem('ht_collapsed', JSON.stringify(collapsed)); }

    function todayRecord() {
      if (!history[todayKey]) history[todayKey] = {};
      return history[todayKey];
    }

    function showTab(name) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('active', tabIds[i] === name);
      });
      if (name === 'byday') renderDayContent();
      if (name === 'longer') renderLongerContent();
      if (name === 'journal') renderJournal();
    }

    function setFilter(val, el) {
      filterDays = val;
      document.querySelectorAll('#tab-byhabit .filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active'); renderConsistency();
    }

    function setDayView(val, el) {
      dayView = val;
      document.querySelectorAll('#tab-byday .filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active'); renderDayContent();
    }

    function setLongerView(val, el) {
      longerView = val;
      document.querySelectorAll('#tab-longer .filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active'); renderLongerContent();
    }

    function getDates(n) {
      if (n === 'all') {
        const all = Object.keys(history).sort().reverse();
        if (!all.includes(todayKey)) all.unshift(todayKey);
        return all;
      }
      const dates = [];
      for (let i = parseInt(n) - 1; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        dates.push(d.toISOString().split('T')[0]);
      }
      return dates.reverse();
    }

    function addHabit() {
      const input = document.getElementById('habitInput');
      const name = input.value.trim();
      const freq = document.getElementById('freqSelect').value;
      if (!name) return;
      habits.push({ id: Date.now(), name, freq, streak: 0, lastDone: null, note: '' });
      input.value = ''; save(); renderToday();
    }

    function toggle(id) {
      const rec = todayRecord();
      const h = habits.find(h => h.id === id);
      if (!h) return;
      rec[id] = !rec[id];
      if (rec[id]) {
        const yest = new Date(); yest.setDate(yest.getDate() - 1);
        const yKey = yest.toISOString().split('T')[0];
        h.streak = h.lastDone === yKey ? (h.streak || 0) + 1 : 1;
        h.lastDone = todayKey;
      }
      save(); renderToday();
    }

    function removeHabit(id) { habits = habits.filter(h => h.id !== id); save(); renderToday(); }

    function openEdit(id) {
      const h = habits.find(h => h.id === id);
      if (!h) return;
      editingId = id;
      document.getElementById('editName').value = h.name;
      document.getElementById('editFreq').value = h.freq || 'daily';
      document.getElementById('editModal').style.display = 'flex';
      setTimeout(() => document.getElementById('editName').focus(), 50);
    }

    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; editingId = null; }

    function saveEdit() {
      const h = habits.find(h => h.id === editingId);
      if (!h) return;
      const name = document.getElementById('editName').value.trim();
      if (!name) return;
      h.name = name; h.freq = document.getElementById('editFreq').value;
      save(); closeEditModal(); renderToday();
    }

    function openNote(id) {
      const h = habits.find(h => h.id === id);
      if (!h) return;
      noteEditingId = id;
      document.getElementById('noteModalTitle').textContent = h.name;
      document.getElementById('noteText').value = h.note || '';
      document.getElementById('removeNoteBtn').style.display = h.note ? 'inline-block' : 'none';
      document.getElementById('noteModal').style.display = 'flex';
      setTimeout(() => document.getElementById('noteText').focus(), 50);
    }

    function closeNoteModal() { document.getElementById('noteModal').style.display = 'none'; noteEditingId = null; }

    function saveNote() {
      const h = habits.find(h => h.id === noteEditingId);
      if (!h) return;
      h.note = document.getElementById('noteText').value.trim();
      save(); closeNoteModal(); renderToday();
    }

    function removeNote() {
      const h = habits.find(h => h.id === noteEditingId);
      if (!h) return;
      h.note = ''; save(); closeNoteModal(); renderToday();
    }

    function toggleSection(key) {
      collapsed[key] = !collapsed[key];
      saveCollapsed(); renderToday();
    }

    function saveJournal() {
      const text = document.getElementById('journalTextarea').value.trim();
      if (!text) return;
      journalEntries[todayKey] = text;
      saveJournalData();
      const badge = document.getElementById('journalSavedBadge');
      badge.style.display = 'inline-block';
      setTimeout(() => badge.style.display = 'none', 2000);
      renderJournalPast();
    }

    function renderJournal() {
      document.getElementById('journalTextarea').value = journalEntries[todayKey] || '';
      renderJournalPast();
    }

    function renderJournalPast() {
      const el = document.getElementById('journalPastSection');
      const past = Object.keys(journalEntries).filter(d => d !== todayKey).sort().reverse();
      if (!past.length) { el.innerHTML = ''; return; }
      const rows = past.map(d => {
        const label = new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        return `<div class="journal-entry"><div class="journal-entry-date">${label}</div><div class="journal-entry-text">${journalEntries[d].replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>`;
      }).join('');
      el.innerHTML = `<div class="journal-past-title">Past entries</div>${rows}`;
    }

    function dragStart(e, id) { dragSrcId = id; setTimeout(() => e.target.classList.add('dragging'), 0); }
    function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    function drop(e, targetId) { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); reorder(dragSrcId, targetId); }
    function dragEnd(e) { e.target.classList.remove('dragging'); document.querySelectorAll('.habit-card').forEach(c => c.classList.remove('drag-over')); }

    function touchStart(e, id) {
      touchDragId = id;
      const card = e.currentTarget.closest('.habit-card');
      card.classList.add('dragging');
      const rect = card.getBoundingClientRect();
      touchClone = card.cloneNode(true);
      touchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;pointer-events:none;z-index:999;border-radius:12px;`;
      document.body.appendChild(touchClone);
    }

    function touchMove(e) {
      if (!touchDragId) return; e.preventDefault();
      const touch = e.touches[0];
      if (touchClone) touchClone.style.top = (touch.clientY - 30) + 'px';
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const card = el ? el.closest('.habit-card') : null;
      document.querySelectorAll('.habit-card').forEach(c => c.classList.remove('drag-over'));
      if (card && card.dataset.id && parseInt(card.dataset.id) !== touchDragId) {
        card.classList.add('drag-over'); touchTarget = parseInt(card.dataset.id);
      } else { touchTarget = null; }
    }

    function touchEnd() {
      if (!touchDragId) return;
      if (touchClone) { touchClone.remove(); touchClone = null; }
      document.querySelectorAll('.habit-card').forEach(c => { c.classList.remove('dragging'); c.classList.remove('drag-over'); });
      if (touchTarget && touchTarget !== touchDragId) reorder(touchDragId, touchTarget);
      touchDragId = null; touchTarget = null;
    }

    function reorder(srcId, tgtId) {
      const srcIdx = habits.findIndex(h => h.id === srcId);
      const tgtIdx = habits.findIndex(h => h.id === tgtId);
      if (srcIdx < 0 || tgtIdx < 0) return;
      const [moved] = habits.splice(srcIdx, 1);
      habits.splice(tgtIdx, 0, moved);
      save(); renderToday();
    }

    function habitCard(h, rec) {
      const freq = h.freq || 'daily';
      const freqBadge = freq === 'weekly'
        ? '<span class="freq-badge-weekly">Weekly</span>'
        : freq === 'monthly'
        ? '<span class="freq-badge-monthly">Monthly</span>'
        : '';
      return `
        <div class="habit-card ${rec[h.id] ? 'done' : ''} freq-${freq}"
          draggable="true" data-id="${h.id}"
          ondragstart="dragStart(event,${h.id})" ondragover="dragOver(event)"
          ondragleave="dragLeave(event)" ondrop="drop(event,${h.id})" ondragend="dragEnd(event)">
          <div class="drag-handle" ontouchstart="touchStart(event,${h.id})" ontouchmove="touchMove(event)" ontouchend="touchEnd(event)">
            <div class="drag-dots">
              <div class="drag-dot"></div><div class="drag-dot"></div>
              <div class="drag-dot"></div><div class="drag-dot"></div>
              <div class="drag-dot"></div><div class="drag-dot"></div>
            </div>
          </div>
          <button class="check-btn" onclick="toggle(${h.id})">
            <svg class="check-icon" width="13" height="13" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="habit-name">${h.name}</span>
          ${freqBadge}
          <span class="streak-badge">${h.streak > 1 ? h.streak + ' day streak' : rec[h.id] ? '1 day' : ''}</span>
          <div class="action-btns">
            <button class="note-btn ${h.note ? 'has-note' : ''}" onclick="openNote(${h.id})">Note</button>
            <button class="edit-btn" onclick="openEdit(${h.id})">Edit</button>
            <button class="del-btn" onclick="removeHabit(${h.id})">Remove</button>
          </div>
        </div>`;
    }

    function collapsibleSection(key, label, habitsArr, rec) {
      const isCollapsed = collapsed[key];
      const count = habitsArr.length;
      const doneCount = habitsArr.filter(h => rec[h.id]).length;
      const cards = habitsArr.map(h => habitCard(h, rec)).join('');
      return `
        <div class="section-wrap">
          <div class="section-header" onclick="toggleSection('${key}')">
            <div class="section-header-left">
              <span class="section-header-label">${label}</span>
              <span class="section-header-count">${doneCount}/${count}</span>
            </div>
            <span class="section-chevron ${isCollapsed ? 'collapsed' : ''}">▾</span>
          </div>
          <div class="section-body ${isCollapsed ? 'collapsed' : ''}" style="max-height:${isCollapsed ? '0' : (count * 70 + 200)}px">
            <div style="padding-top:8px;">${cards}</div>
          </div>
        </div>`;
    }

    function renderToday() {
      const rec = todayRecord();
      const daily = habits.filter(h => (h.freq || 'daily') === 'daily');
      const weekly = habits.filter(h => h.freq === 'weekly');
      const monthly = habits.filter(h => h.freq === 'monthly');
      const all = [...daily, ...weekly, ...monthly];
      const done = all.filter(h => rec[h.id]).length;
      const dailyDone = daily.filter(h => rec[h.id]).length;
      document.getElementById('doneCount').textContent = done;
      document.getElementById('totalCount').textContent = all.length;
      document.getElementById('pctCount').textContent = daily.length > 0 ? Math.round((dailyDone / daily.length) * 100) + '%' : '0%';
      let html = '';
      if (daily.length) html += collapsibleSection('daily', 'Daily', daily, rec);
      if (weekly.length) html += collapsibleSection('weekly', 'Weekly', weekly, rec);
      if (monthly.length) html += collapsibleSection('monthly', 'Monthly', monthly, rec);
      document.getElementById('habitList').innerHTML = html;
    }

    function renderConsistency() {
      const dates = getDates(filterDays);
      const el = document.getElementById('habitConsistency');
      if (!habits.length) { el.innerHTML = '<div class="empty">No habits yet.</div>'; return; }
      const totalDays = dates.length;
      el.innerHTML = habits.map(h => {
        const filled = dates.filter(d => history[d] && history[d][h.id]).length;
        const pct = totalDays > 0 ? Math.round((filled / totalDays) * 100) : 0;
        const dots = dates.slice().reverse().map(d => {
          const wasTracked = history[d] !== undefined || d === todayKey;
          const isDone = history[d] && history[d][h.id];
          let cls = isDone ? 'filled' : wasTracked ? 'missed' : '';
          return `<div class="dot ${cls}" title="${d}"></div>`;
        }).join('');
        return `<div class="habit-row">
          <div class="habit-row-top">
            <span class="habit-row-name">${h.name} <span style="font-size:10px;color:var(--text3)">${h.freq||'daily'}</span></span>
            <span class="habit-row-pct">${pct}% — ${filled}/${totalDays} days</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
          <div class="dots">${dots}</div>
        </div>`;
      }).join('');
    }

    function renderDayContent() {
      const el = document.getElementById('dayContent');
      const dailyHabits = habits.filter(h => (h.freq || 'daily') === 'daily');

      if (dayView === 'habit7' || dayView === 'habit30' || dayView === 'habitall') {
        const n = dayView === 'habit7' ? '7' : dayView === 'habit30' ? '30' : 'all';
        const dates = getDates(n);
        const totalDays = dates.length;
        if (!dailyHabits.length) { el.innerHTML = '<div class="empty">No daily habits yet.</div>'; return; }
        el.innerHTML = dailyHabits.map(h => {
          const filled = dates.filter(d => history[d] && history[d][h.id]).length;
          const pct = totalDays > 0 ? Math.round((filled / totalDays) * 100) : 0;
          const dots = dates.slice().reverse().map(d => {
            const wasTracked = history[d] !== undefined || d === todayKey;
            const isDone = history[d] && history[d][h.id];
            let cls = isDone ? 'filled' : wasTracked ? 'missed' : '';
            return `<div class="dot ${cls}" title="${d}"></div>`;
          }).join('');
          return `<div class="habit-row">
            <div class="habit-row-top">
              <span class="habit-row-name">${h.name}</span>
              <span class="habit-row-pct">${pct}% — ${filled}/${totalDays} days</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="dots">${dots}</div>
          </div>`;
        }).join('');
        return;
      }

      // Today view — daily habits only
      const rec = history[todayKey] || {};
      const total = dailyHabits.length;
      const doneH = dailyHabits.filter(h => rec[h.id]);
      const score = total > 0 ? Math.round((doneH.length / total) * 100) : 0;
      const items = dailyHabits.map(h => `
        <div class="group-item ${rec[h.id] ? 'done-item' : ''}">
          <div class="g-dot ${rec[h.id] ? 'done-dot' : ''}"></div>${h.name}
        </div>`).join('');
      el.innerHTML = `<div class="group-card">
        <div class="group-card-header"><span class="group-card-label">Today — daily habits</span><span class="group-score">${doneH.length}/${total} — ${score}%</span></div>
        <div class="group-items">${items}</div></div>`;
    }

    function getWeekKey(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const mon = new Date(d); mon.setDate(diff);
      return mon.toISOString().split('T')[0];
    }

    function renderLongerContent() {
      const el = document.getElementById('longerContent');
      const rec = history[todayKey] || {};

      if (longerView === 'week') {
        const weeklyHabits = habits.filter(h => h.freq === 'weekly');
        if (!weeklyHabits.length) {
          el.innerHTML = '<div class="empty">No weekly habits yet — add one from the Today tab!</div>';
          return;
        }
        const done = weeklyHabits.filter(h => rec[h.id]);
        const score = Math.round((done.length / weeklyHabits.length) * 100);
        const items = weeklyHabits.map(h => `
          <div class="group-item ${rec[h.id] ? 'done-item' : ''}">
            <div class="g-dot ${rec[h.id] ? 'done-dot' : ''}"></div>${h.name}
          </div>`).join('');
        el.innerHTML = `<div class="group-card">
          <div class="group-card-header">
            <span class="group-card-label">This week</span>
            <span class="group-score">${done.length}/${weeklyHabits.length} — ${score}%</span>
          </div>
          <div class="group-items">${items}</div>
        </div>`;

      } else {
        const monthlyHabits = habits.filter(h => h.freq === 'monthly');
        if (!monthlyHabits.length) {
          el.innerHTML = '<div class="empty">No monthly habits yet — add one from the Today tab!</div>';
          return;
        }
        const done = monthlyHabits.filter(h => rec[h.id]);
        const score = Math.round((done.length / monthlyHabits.length) * 100);
        const items = monthlyHabits.map(h => `
          <div class="group-item ${rec[h.id] ? 'done-item' : ''}">
            <div class="g-dot ${rec[h.id] ? 'done-dot' : ''}"></div>${h.name}
          </div>`).join('');
        el.innerHTML = `<div class="group-card">
          <div class="group-card-header">
            <span class="group-card-label">This month</span>
            <span class="group-score">${done.length}/${monthlyHabits.length} — ${score}%</span>
          </div>
          <div class="group-items">${items}</div>
        </div>`;
      }
    }

    document.getElementById('habitInput').addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });
    document.getElementById('editModal').addEventListener('keydown', e => { if (e.key === 'Enter') saveEdit(); if (e.key === 'Escape') closeEditModal(); });
    document.getElementById('noteModal').addEventListener('keydown', e => { if (e.key === 'Escape') closeNoteModal(); });
    document.addEventListener('touchmove', e => { if (touchDragId) e.preventDefault(); }, { passive: false });
    renderToday();
  </script>
</body>
</html>
