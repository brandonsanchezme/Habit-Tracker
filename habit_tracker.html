<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #ebebea;
      --text: #1a1a1a;
      --text2: #666660;
      --text3: #999993;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.2);
      --green: #1D9E75;
      --green-light: #E1F5EE;
      --green-mid: #9FE1CB;
      --green-dark: #0F6E56;
      --green-darker: #085041;
      --blue: #378ADD;
      --blue-light: #E6F1FB;
      --blue-dark: #185FA5;
      --radius: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1d;
        --bg2: #2a2a28;
        --bg3: #333331;
        --text: #f0f0ee;
        --text2: #aaaaaa;
        --text3: #777777;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.2);
        --green-light: #0a3326;
        --green-mid: #0d4a35;
        --green-dark: #5DCAA5;
        --green-darker: #9FE1CB;
        --blue-light: #0c2a45;
        --blue-dark: #85B7EB;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; color: var(--text); }
    .tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: var(--radius); padding: 4px; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; border-radius: 6px; border: none; background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .tab.active { background: var(--bg); color: var(--text); font-weight: 500; border: 0.5px solid var(--border); }
    .add-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .add-row input { flex: 1; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 14px; outline: none; font-family: inherit; }
    .add-row input:focus { border-color: var(--green); }
    .add-btn { padding: 10px 16px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 13px; cursor: pointer; white-space: nowrap; font-family: inherit; }
    .add-btn:hover { background: var(--bg3); }
    .summary { display: flex; gap: 10px; margin-bottom: 1.25rem; }
    .stat { flex: 1; background: var(--bg2); border-radius: var(--radius); padding: 12px; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .date-label { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
    .category-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin: 16px 0 8px; }
    .habit-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 6px; transition: border-color 0.15s; }
    .habit-card.done { border-color: var(--green); background: var(--green-light); }
    .habit-card.weekly { border-left: 3px solid var(--blue); }
    .habit-card.weekly.done { border-left: 3px solid var(--green); }
    .check-btn { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .habit-card.done .check-btn { background: var(--green); border-color: var(--green); }
    .check-icon { display: none; }
    .habit-card.done .check-icon { display: block; }
    .habit-name { flex: 1; font-size: 14px; color: var(--text); }
    .habit-card.done .habit-name { color: var(--green-dark); text-decoration: line-through; }
    .streak-badge { font-size: 11px; color: var(--text2); background: var(--bg2); border-radius: 20px; padding: 2px 8px; white-space: nowrap; }
    .habit-card.done .streak-badge { background: var(--green-mid); color: var(--green-darker); }
    .weekly-badge { font-size: 10px; color: var(--blue-dark); background: var(--blue-light); border-radius: 20px; padding: 2px 7px; white-space: nowrap; }
    .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 14px; padding: 4px; border-radius: 4px; line-height: 1; }
    .del-btn:hover { color: var(--text2); background: var(--bg2); }
    .empty { text-align: center; padding: 2rem; color: var(--text2); font-size: 13px; }
    .habit-row { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 8px; }
    .habit-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .habit-row-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .habit-row-pct { font-size: 12px; color: var(--text2); }
    .bar-bg { height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s; }
    .dots { display: flex; gap: 3px; flex-wrap: wrap; }
    .dot { width: 18px; height: 18px; border-radius: 3px; background: var(--bg2); border: 0.5px solid var(--border); cursor: default; }
    .dot.filled { background: var(--green); border-color: var(--green); }
    .by-day-entry { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 8px; }
    .by-day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .by-day-date { font-size: 13px; font-weight: 500; color: var(--text); }
    .by-day-score { font-size: 12px; color: var(--text2); background: var(--bg2); border-radius: 20px; padding: 2px 10px; }
    .by-day-items { display: flex; flex-direction: column; gap: 5px; }
    .by-day-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
    .by-day-item.done-item { color: var(--green-dark); }
    .dot-sm { width: 10px; height: 10px; border-radius: 2px; background: var(--bg2); flex-shrink: 0; }
    .dot-sm.done-dot { background: var(--green); }
    .filter-row { display: flex; gap: 6px; margin-bottom: 1rem; }
    .filter-btn { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: inherit; }
    .filter-btn.active { background: var(--bg2); color: var(--text); border-color: var(--border2); font-weight: 500; }
    .section { display: none; }
    .section.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Habit Tracker</h1>
    <div class="tabs">
      <button class="tab active" onclick="showTab('today')">Today</button>
      <button class="tab" onclick="showTab('habits')">By habit</button>
      <button class="tab" onclick="showTab('days')">By day</button>
    </div>

    <div id="tab-today" class="section active">
      <div class="add-row">
        <input type="text" id="habitInput" placeholder="Add a custom habit..." />
        <button class="add-btn" onclick="addHabit()">+ Add</button>
      </div>
      <div class="summary">
        <div class="stat"><div class="stat-num" id="doneCount">0</div><div class="stat-label">Done today</div></div>
        <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total habits</div></div>
        <div class="stat"><div class="stat-num" id="pctCount">0%</div><div class="stat-label">Today's score</div></div>
      </div>
      <div class="date-label" id="dateLabel"></div>
      <div id="habitList"></div>
    </div>

    <div id="tab-habits" class="section">
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('7',this)">Last 7 days</button>
        <button class="filter-btn" onclick="setFilter('30',this)">Last 30 days</button>
        <button class="filter-btn" onclick="setFilter('all',this)">All time</button>
      </div>
      <div id="habitConsistency"></div>
    </div>

    <div id="tab-days" class="section">
      <div class="filter-row">
        <button class="filter-btn active" onclick="setDayFilter('7',this)">Last 7 days</button>
        <button class="filter-btn" onclick="setDayFilter('30',this)">Last 30 days</button>
        <button class="filter-btn" onclick="setFilter('all',this)">All time</button>
      </div>
      <div id="dayHistory"></div>
    </div>
  </div>

  <script>
    const DEFAULT_HABITS = [
      { id: 1, name: 'Morning journal', weekly: false, streak: 0, lastDone: null },
      { id: 2, name: '10,000 steps', weekly: false, streak: 0, lastDone: null },
      { id: 3, name: 'Mobility (15 min)', weekly: false, streak: 0, lastDone: null },
      { id: 4, name: '2300 calories', weekly: false, streak: 0, lastDone: null },
      { id: 5, name: '200g protein', weekly: false, streak: 0, lastDone: null },
      { id: 6, name: '½ gal water', weekly: false, streak: 0, lastDone: null },
      { id: 7, name: 'Vitamin + electrolyte', weekly: false, streak: 0, lastDone: null },
      { id: 8, name: 'Creatine', weekly: false, streak: 0, lastDone: null },
      { id: 9, name: 'Deadhangs', weekly: false, streak: 0, lastDone: null },
      { id: 10, name: 'Lift or cardio', weekly: false, streak: 0, lastDone: null },
      { id: 11, name: 'Read (30 min)', weekly: false, streak: 0, lastDone: null },
      { id: 12, name: 'R&D (1 hr)', weekly: false, streak: 0, lastDone: null },
      { id: 13, name: 'Business (1.5 hrs)', weekly: false, streak: 0, lastDone: null },
      { id: 14, name: 'IG + TT post', weekly: false, streak: 0, lastDone: null },
      { id: 15, name: '3 major to-dos', weekly: false, streak: 0, lastDone: null },
      { id: 16, name: 'Weekly meeting', weekly: true, streak: 0, lastDone: null },
      { id: 17, name: 'Substack', weekly: true, streak: 0, lastDone: null },
      { id: 18, name: 'YouTube', weekly: true, streak: 0, lastDone: null },
      { id: 19, name: 'Photo/video journal', weekly: true, streak: 0, lastDone: null },
      { id: 20, name: 'Social outing', weekly: true, streak: 0, lastDone: null },
    ];

    const todayKey = new Date().toISOString().split('T')[0];
    let habits = JSON.parse(localStorage.getItem('ht_habits') || 'null') || DEFAULT_HABITS.map(h => ({...h}));
    let history = JSON.parse(localStorage.getItem('ht_history') || '{}');
    let filterDays = '7';
    let dayFilterDays = '7';

    document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    function save() {
      localStorage.setItem('ht_habits', JSON.stringify(habits));
      localStorage.setItem('ht_history', JSON.stringify(history));
    }

    function todayRecord() {
      if (!history[todayKey]) history[todayKey] = {};
      return history[todayKey];
    }

    function showTab(name) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('active', ['today','habits','days'][i] === name);
      });
      if (name === 'habits') renderConsistency();
      if (name === 'days') renderDays();
    }

    function setFilter(val, el) {
      filterDays = val;
      document.querySelectorAll('#tab-habits .filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderConsistency();
    }

    function setDayFilter(val, el) {
      dayFilterDays = val;
      document.querySelectorAll('#tab-days .filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderDays();
    }

    function getDates(n) {
      if (n === 'all') {
        const allDates = Object.keys(history).sort().reverse();
        if (!allDates.includes(todayKey)) allDates.unshift(todayKey);
        return allDates;
      }
      const dates = [];
      for (let i = parseInt(n) - 1; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        dates.push(d.toISOString().split('T')[0]);
      }
      return dates.reverse();
    }

    function addHabit() {
      const input = document.getElementById('habitInput');
      const name = input.value.trim();
      if (!name) return;
      habits.push({ id: Date.now(), name, weekly: false, streak: 0, lastDone: null });
      input.value = '';
      save();
      renderToday();
    }

    function toggle(id) {
      const rec = todayRecord();
      const h = habits.find(h => h.id === id);
      if (!h) return;
      rec[id] = !rec[id];
      if (rec[id]) {
        const yest = new Date();
        yest.setDate(yest.getDate() - 1);
        const yKey = yest.toISOString().split('T')[0];
        h.streak = h.lastDone === yKey ? (h.streak || 0) + 1 : 1;
        h.lastDone = todayKey;
      }
      save();
      renderToday();
    }

    function removeHabit(id) {
      habits = habits.filter(h => h.id !== id);
      save();
      renderToday();
    }

    function renderToday() {
      const rec = todayRecord();
      const daily = habits.filter(h => !h.weekly);
      const weekly = habits.filter(h => h.weekly);
      const all = [...daily, ...weekly];
      const done = all.filter(h => rec[h.id]).length;
      document.getElementById('doneCount').textContent = done;
      document.getElementById('totalCount').textContent = all.length;
      document.getElementById('pctCount').textContent = all.length > 0 ? Math.round((done / all.length) * 100) + '%' : '0%';

      function group(arr) {
        return arr.map(h => `
          <div class="habit-card ${rec[h.id] ? 'done' : ''} ${h.weekly ? 'weekly' : ''}">
            <button class="check-btn" onclick="toggle(${h.id})">
              <svg class="check-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 6l3 3 5-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <span class="habit-name">${h.name}</span>
            ${h.weekly ? '<span class="weekly-badge">1x/week</span>' : ''}
            <span class="streak-badge">${h.streak > 1 ? h.streak + ' day streak' : rec[h.id] ? '1 day' : ''}</span>
            <button class="del-btn" onclick="removeHabit(${h.id})" title="Remove">✕</button>
          </div>
        `).join('');
      }

      document.getElementById('habitList').innerHTML = `
        <div class="category-label">Daily</div>
        ${group(daily)}
        <div class="category-label">Weekly</div>
        ${group(weekly)}
      `;
    }

    function renderConsistency() {
      const dates = getDates(filterDays);
      const el = document.getElementById('habitConsistency');
      if (!habits.length) { el.innerHTML = '<div class="empty">No habits yet.</div>'; return; }
      el.innerHTML = habits.map(h => {
        const filled = dates.filter(d => history[d] && history[d][h.id]);
        const pct = dates.length > 0 ? Math.round((filled.length / dates.length) * 100) : 0;
        const dots = dates.slice().reverse().map(d => `<div class="dot ${history[d] && history[d][h.id] ? 'filled' : ''}" title="${d}"></div>`).join('');
        return `
          <div class="habit-row">
            <div class="habit-row-top">
              <span class="habit-row-name">${h.name}${h.weekly ? ' <span style="font-size:10px;color:var(--blue-dark);">1x/week</span>' : ''}</span>
              <span class="habit-row-pct">${pct}% — ${filled.length}/${dates.length} days</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="dots">${dots}</div>
          </div>
        `;
      }).join('');
    }

    function renderDays() {
      const dates = getDates(dayFilterDays);
      const el = document.getElementById('dayHistory');
      const relevant = dates.filter(d => d === todayKey || (history[d] && Object.keys(history[d]).length > 0));
      if (!relevant.length) { el.innerHTML = '<div class="empty">No history yet — start checking off habits today!</div>'; return; }
      el.innerHTML = relevant.map(d => {
        const rec = history[d] || {};
        const doneH = habits.filter(h => rec[h.id]);
        const total = habits.length;
        const score = total > 0 ? Math.round((doneH.length / total) * 100) : 0;
        const label = d === todayKey ? 'Today' : new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        const items = habits.map(h => `
          <div class="by-day-item ${rec[h.id] ? 'done-item' : ''}">
            <div class="dot-sm ${rec[h.id] ? 'done-dot' : ''}"></div>
            ${h.name}
          </div>
        `).join('');
        return `
          <div class="by-day-entry">
            <div class="by-day-header">
              <span class="by-day-date">${label}</span>
              <span class="by-day-score">${doneH.length}/${total} — ${score}%</span>
            </div>
            <div class="by-day-items">${items}</div>
          </div>
        `;
      }).join('');
    }

    document.getElementById('habitInput').addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });
    renderToday();
  </script>
</body>
</html>
